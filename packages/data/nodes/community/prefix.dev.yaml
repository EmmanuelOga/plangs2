name: Prefix.dev
shortDesc: Creators of pixi, a fast software package manager for Python.
description: Creators of pixi, a fast software package manager built on top of the existing conda ecosystem. Spins up development environments quickly on Windows, macOS and Linux. Automatic lockfiles produce reproducible environments across operating systems (without Docker!). pixi supports Python, R, C/C++, Rust, Ruby, and many other languages.
