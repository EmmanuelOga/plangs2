name: OSX
shortDesc: The primary operating system for Apple's Mac computers.
description: macOS, originally Mac OS X, previously shortened as OS X, is a Unix-based operating system developed and marketed by Apple since 2001. It is the primary operating system for Apple's Mac computers.
