name: C++
shortDesc: General-purpose language designed by Bjarne Stroustrup, supporting multiple programming paradigms.
description: General-purpose language created by Bjarne Stroustrup as an extension of C. It supports object-oriented, generic, and functional programming with low-level memory manipulation capabilities. Used broadly for its performance, C++ is implemented in systems programming and resource-constrained applications like operating systems and game development.
