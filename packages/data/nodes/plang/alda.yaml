name: Alda
shortDesc: Text-based programming language for music composition with simple syntax for musicians and programmers.
description: Text-based programming language designed for music composition. It allows users to write and play music using a simple syntax in a text editor and execute it through the command line. Its intuitive syntax is accessible for both musicians with no programming background and programmers with limited music knowledge, making it a versatile tool for creative musical expression.
created: "2015"
keywords:
