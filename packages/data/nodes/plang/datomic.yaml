name: Datomic
shortDesc: Distributed database with an immutable data model and Datalog implementation.
description: Distributed database and implementation of Datalog. It supports ACID transactions, joins, and a logical query language, Datalog. A distinguishing feature of Datomic is its immutable data model where time is a basic feature of data entities, allowing for temporal queries.
