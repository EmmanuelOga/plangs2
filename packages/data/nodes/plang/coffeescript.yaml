name: CoffeeScript
shortDesc: Compiles into JavaScript, enhancing its brevity with syntactic sugar inspired by Haskell, Ruby, and Python.
description: A little language that compiles into JavaScript. It adds syntactic sugar inspired by Haskell, Ruby, and Python to enhance JavaScript's brevity and readability. CoffeeScript was designed to expose the good parts of JavaScript in a simple way, compiling into equivalent JavaScript. Many unnecessary parentheses and braces can be omitted.
