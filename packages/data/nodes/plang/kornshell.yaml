name: KornShell
shortDesc: Unix-based shell that combines features from C and Bourne shells, supporting POSIX standards.
description: Unix-based shell developed by David Korn that combines features from the C shell and Bourne shell. It introduced command line editing, associative arrays, and floating-point arithmetic operations, and conforms to established POSIX standards.
created: "1983"
