name: Scratch
shortDesc: Block-based visual language for children to learn coding through interactive projects.
description: Block-based visual programming language developed by MIT Media Lab for children, providing an educational tool to learn coding through interactive projects. Users create animations, games, and stories using a simple drag-and-drop interface. The language encourages creativity and logical thinking, with global reach and availability in multiple languages.
