name: SWI-Prolog
shortDesc: Implementation of Prolog focused on versatility and rich libraries.
description: A versatile implementation of the Prolog programming language, designed with a rich set of libraries and features for teaching, semantic web applications, and more. It supports constraint logic programming, multithreading, unit testing, and has various interfaces for Java, ODBC, GUI development, web services, and more. It includes tools like an IDE with a GUI debugger and profiler.
