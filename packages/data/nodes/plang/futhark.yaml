name: Futhark
shortDesc: Functional, parallel programming language optimized for high-performance GPU and CPU execution.
description: Data-parallel programming language designed for high-performance computing, particularly on GPUs, utilizing a functional programming paradigm influenced by languages such as APL and Haskell. It supports automatic differentiation and emphasizes efficient data parallelism in array computations through a Hindley-Milner type system with uniqueness types.
