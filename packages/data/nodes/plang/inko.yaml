name: Inko
shortDesc: Language for efficient, safe concurrent software, with features like static typing and type-safe concurrency.
description: Programming language designed for building concurrent software efficiently and safely. It features deterministic automatic memory management, move semantics, static typing, and type-safe concurrency. It is particularly known for avoiding runtime errors, race conditions, and unpredictable performance.
created: "2016"
keywords:
  - concurrent
  - inko
  - safe
  - type-safe
extGithubPath: inko-lang/inko
extHomeURL: https://inko-lang.org
