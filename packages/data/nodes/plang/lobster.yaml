name: Lobster
shortDesc: Statically typed, game-oriented language with Python-like syntax and compile-time memory management.
description: Statically typed programming language with Python-like syntax, emphasizing friendly and efficient features for game development and graphical applications. It provides many features catering to developers such as compile-time memory management and an expressive type system, helping reduce the complexity of code.
