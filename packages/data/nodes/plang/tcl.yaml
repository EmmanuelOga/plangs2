name: Tcl
shortDesc: Dynamic, interpreted programming language known for its extensibility, embeddability, and support for multiple paradigms.
description: High-level, general-purpose, interpreted, dynamic programming language. Designed for extensibility and embeddability, Tcl supports multiple programming paradigms including event-driven, functional, imperative, and object-oriented styles. It is often used together with the Tk toolkit for GUI development, and is widely used for web applications, testing, and script automation.
