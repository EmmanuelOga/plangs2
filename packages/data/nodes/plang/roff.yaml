name: Roff
shortDesc: Typesetting language originating from UNIX, known for derivatives like 'troff' and 'nroff'.
description: Programming language used for typesetting, generating formatted documents from plain-text mixed with commands. It originated from the UNIX operating system and has several derivatives including 'troff' and 'nroff'. Today, 'groff' is its GNU implementation.
