name: QML
shortDesc: Declarative user interface markup language, primarily for Qt Quick applications.
description: Qt Modeling Language is a user interface markup language for user interfaces. It is declarative, leveraging inline JavaScript for imperative aspects. QML is designed for applications prioritizing touch input, animations, and user experiences, especially for mobile platforms. It extends JavaScript with a custom V4 engine, compiling to native C++, or caching compiled QML for fast application startups. QML can directly integrate with C++ via the Qt framework.
