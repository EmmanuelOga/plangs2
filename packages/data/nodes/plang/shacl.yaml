name: SHACL
shortDesc: W3C standard language for RDF graph constraints and validation.
description: Shapes Constraint Language is a World Wide Web Consortium (W3C) standard language for describing Resource Description Framework (RDF) graphs. SHACL has been designed to enhance the semantic and technical interoperability layers of ontologies expressed as RDF graphs.
