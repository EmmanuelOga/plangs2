name: Pure
shortDesc: Based on term rewriting, integrating symbolic computation and JIT compilation via LLVM.
description: Successor to the equational language Q, Pure is a dynamically typed, functional programming language based on term rewriting. It integrates symbolic computation, pattern matching, and an easy-to-use C interface with the ability to JIT compile to native code via LLVM.
