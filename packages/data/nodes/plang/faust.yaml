name: FAUST
shortDesc: Designed for sound synthesis and high-performance audio processing, supporting multiple backends.
description: Functional AUdio STream is a domain-specific programming language focused on designing sound synthesis and audio processing applications. It stands out for its high-performance real-time audio processing capabilities and compiles into various backends, offering flexibility across different platforms. Developed by GRAME-CNCM, it combines functional programming with a block diagram syntax.
