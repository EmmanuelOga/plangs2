name: AssemblyScript
shortDesc: AssemblyScript compiles a TypeScript variant to WebAssembly.
description: AssemblyScript is designed to compile a variant of TypeScript to WebAssembly. By building upon TypeScript, it offers static typing with a syntax familiar to JavaScript developers, thus enabling efficient compilation to WebAssembly without the need for arcane languages or tools.
