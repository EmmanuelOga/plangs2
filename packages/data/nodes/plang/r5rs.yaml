name: R5RS
shortDesc: R5RS is the fifth version of Scheme, emphasizing minimalist and functional programming.
description: R5RS is the fifth revision of the Scheme programming language, part of the Lisp family, known for its minimalist and clean design focusing on functional programming and domain-specific languages. This version, ratified in January 1998, introduced various standard features to make Scheme widely implementable and usable for educational, research, and multi-paradigm development.
