name: Orca
shortDesc: Esoteric language for creating procedural sequencers for music and visual applications.
description: Esoteric programming language designed to create procedural sequencers, facilitating real-time algorithmic music composition and experimentation. It functions as a livecoding environment capable of interfacing with audio/visual applications via MIDI, OSC, and UDP.
