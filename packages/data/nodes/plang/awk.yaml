name: AWK
shortDesc: Text processing and data extraction, common on Unix-like systems.
description: Domain-specific language designed for text processing and is typically used as a data extraction and reporting tool. It operates as a filter and is a standard feature of most Unix-like operating systems. AWK is recognized for its terseness and power in text processing, facilitating one-liner programs.
