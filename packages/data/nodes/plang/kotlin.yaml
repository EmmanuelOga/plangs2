name: Kotlin
shortDesc: Concise, statically typed language interoperative with Java, targeting JVM and other platforms.
description: Cross-platform, statically typed language designed to interoperate with Java, featuring concise syntax due to its type inference. It targets the JVM and compiles to JavaScript and native code via LLVM for various platforms, under the guidance of JetBrains and the Kotlin Foundation.
