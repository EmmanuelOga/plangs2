name: Nickel
shortDesc: Lightweight configuration language designed for generating modular and reusable configuration files.
description: Lightweight configuration language aimed at automating the generation of configuration files. It combines JSON semantics with first-class functions, allowing for modular and reusable configurations. With features like optional static typing and design by contract, Nickel ensures that complex configurations are easy to manage and less prone to errors.
created: "2021"
keywords:
  - configuration
  - json
  - nickel
  - xml
  - yaml
extGithubPath: tweag/nickel
extHomeURL: https://nickel-lang.org
extWikipediaPath: Nickel_(programming_language)
extensions:
  - .ncl
githubStars: 2400
isTranspiler: true
