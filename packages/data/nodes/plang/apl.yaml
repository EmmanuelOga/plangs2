name: APL
shortDesc: A concise programming language focused on multi-dimensional arrays, using unique symbols to represent functions, influencing modeling and functional programming.
description: Developed in the 1960s by Kenneth E. Iverson. Its central datatype is the multi-dimensional array, and it uses unique symbols to represent functions, allowing for very concise code. APL has influenced many areas including concept modeling and functional programming, and inspired several other languages.
