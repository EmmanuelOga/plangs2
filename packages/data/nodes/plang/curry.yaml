name: Curry
shortDesc: Declarative language that integrates features of functional and logic programming paradigms
description: A declarative programming language that uniquely integrates features of functional and logic programming paradigms. It supports non-deterministic computations, constraint programming, and combines features such as lazy evaluation and strong typing. Curry is based on Haskell but extends it with logic programming features.
