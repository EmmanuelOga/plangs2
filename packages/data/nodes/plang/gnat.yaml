    - para/concurrent
    - para/general-purpose
    - para/procedural
    - para/structured
  platforms:
    - plat/bsd
    - plat/cross
    - plat/linux
    - plat/windows
  tags:
    - tag/compiler
    - tag/framework
    - tag/interpreters
  typeSystems:
