name: GNAT
shortDesc: Free Ada compiler in the GCC suite, supporting all Ada versions.
description: Free-software compiler for the Ada programming language that forms part of the GNU Compiler Collection (GCC). It supports all versions of Ada. Originally named as an acronym for GNU NYU Ada Translator, GNAT is developed by NYU, AdaCore, and the GNU Project. It includes a rich set of tools and libraries to support evolving project needs.
created: "1995"
keywords:
  - ada
  - compiler
  - gcc
  - gnat
extHomeURL: http://www.getadanow.com/
extWikipediaPath: GNAT
extensions:
  - .adb
  - .ads
isTranspiler: false
releases:
