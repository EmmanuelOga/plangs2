name: Clozure CL
shortDesc: Free Common Lisp implementation offering full ANSI compliance and several extensions.
description: Free implementation of Common Lisp, providing a complete ANSI Common Lisp standard with various extensions such as CLOS MOP, threads, and streams. It includes a command-line development environment and an IDE for macOS using the Hemlock editor, delivering fast compilation, native threads, and a garbage collector. It is open-source, maintained by Clozure Associates.
