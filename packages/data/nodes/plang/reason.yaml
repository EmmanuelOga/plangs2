name: Reason
shortDesc: Multi-paradigm language focusing on functional programming, compiling to OCaml and JavaScript.
description: General-purpose, high-level, multi-paradigm programming language and syntax extension for OCaml, created by Jordan Walke at Facebook. It focuses on functional and object-oriented programming features and compiles to native code via OCaml's compiler, as well as to JavaScript using a ReScript compiler.
