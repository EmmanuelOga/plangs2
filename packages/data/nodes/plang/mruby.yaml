    - pl/ruby
  influencedBy:
    - pl/ruby
  licenses:
    - lic/mit
  paradigms:
    - para/embedded
    - para/oop
    - para/scripting
  platforms:
    - plat/cross
    - plat/embedded
  tags:
    - tag/compiler
    - tag/embedded
    - tag/interpreters
  typeSystems:
    - tsys/duck
    - tsys/dynamic
    - tsys/object
  writtenWith:
    - pl/c
