name: mruby
shortDesc: Lightweight Ruby interpreter designed for embeddability.
description: Interpreter for the Ruby programming language that aims to be lightweight and easily embeddable. It is developed under the leadership of Yukihiro Matsumoto and features contributions from over 100 developers.
created: "2012"
keywords:
  - embedded ruby
  - lightweight ruby
  - mruby
extGithubPath: mruby/mruby
extHomeURL: https://mruby.org/
extWikipediaPath: Mruby
extensions:
  - .rb
githubStars: 5300
isTranspiler: false
rels:
