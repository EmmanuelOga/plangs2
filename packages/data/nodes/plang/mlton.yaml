name: MLton
shortDesc: SML97 compatibile language with advanced optimizations.
description: Whole-program optimizing compiler for the Standard ML programming language. It generates efficient executables by leveraging advanced optimizations, unboxed native data types, fast arithmetic operations via GMP, and supports extensive code generation and garbage collection strategies. MLton offers a robust SML environment with full SML97 compatibility and a seamless C foreign function interface.
