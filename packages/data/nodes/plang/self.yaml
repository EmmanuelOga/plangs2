name: Self
shortDesc: Prototype-based dynamic OOP language, influenced by Smalltalk and APL, impacting JavaScript.
description: Prototype-based dynamic object-oriented programming language, environment, and virtual machine focused on principles like simplicity and uniformity. It allows direct and physical interaction with objects and integrates a programming environment for modifying objects. Influenced by Smalltalk and APL, it influenced languages like JavaScript and NewtonScript.
