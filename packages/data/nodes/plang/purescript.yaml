name: PureScript
shortDesc: Strongly-typed, purely-functional language similar to Haskell, compiling to JavaScript.
description: Strongly-typed, purely-functional programming language that compiles to JavaScript and other languages. It is used for developing web applications, server-side apps, and desktop applications. PureScript's syntax is similar to Haskell and includes features like row polymorphism, extensible records, and strict evaluation.
