name: Nim
shortDesc: Statically typed, compiled language focusing on performance and elegant syntax, compilable to C, C++, and JavaScript.
description: General-purpose, statically typed, compiled programming language designed for performance and elegant syntax. It supports multiple paradigms including imperative, functional, and metaprogramming. Nim can compile to C, C++, and JavaScript, making it suitable for system programming, web, and embedded applications.
