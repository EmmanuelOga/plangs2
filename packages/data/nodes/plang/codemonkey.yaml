name: CodeMonkey
shortDesc: Educational coding platform for beginners, teaching programming concepts through game-based learning.
description: Educational computer coding environment designed to teach programming concepts and languages to beginners, specifically students aged 6-14. It provides an engaging interface where students can learn text-based programming in languages such as Python, Blockly, and CoffeeScript, while also gaining an understanding of fundamental computer science and mathematics concepts. The platform, initially developed by Jonathan Schor, Ido Schor, and Yishai Pinchover, was first released in 2014 with support from the Center for Educational Technology in Israel.
