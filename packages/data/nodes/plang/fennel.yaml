name: Fennel
shortDesc: Lua-compatible language with Lisp syntax and macro system.
description: Programming language that combines the simplicity, speed, and reach of Lua with the flexibility of Lisp syntax and a macro system. It offers full Lua compatibility and can run wherever Lua runs, including game development, web servers, and microcontrollers.
