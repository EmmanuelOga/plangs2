name: Soufflé
shortDesc: Parallel logic programming language used for static analysis and reverse engineering, influenced by Datalog.
description: Open source parallel logic programming language, influenced by Datalog, featuring both an interpreter and a compiler that targets parallel C++. Designed for large-scale static analysis, it allows for rapid prototyping in logic-based problem solving, and is used primarily for building static analyzers, disassemblers, and binary reverse engineering tools.
