name: Cilk
shortDesc: Family of languages designed for parallel computing extending C and C++.
description: Cilk++, Cilk Plus, and OpenCilk are general-purpose programming languages designed for multithreaded parallel computing. They are based on the C and C++ languages and extend them with constructs for parallel loops and the fork-join idiom.
