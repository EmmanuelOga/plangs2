name: Hack
shortDesc: PHP-influenced language with static and gradual typing, used on the HHVM platform.
description: Programming language developed by Meta (formerly Facebook) for HHVM, designed to enhance PHP with features like static type checking, gradual typing, and asynchronous programming. It supports various programming paradigms and aims to provide a balance between development speed and safety.
