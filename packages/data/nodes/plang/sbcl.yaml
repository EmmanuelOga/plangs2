name: SBCL
shortDesc: Open-source, high-performance Common Lisp implementation derived from CMUCL.
description: Steel Bank Common Lisp is an implementation of ANSI Common Lisp that focuses on providing a high-performance compiler and a runtime environment for multi-paradigm programming. It is derived from CMUCL and extends its functionality with improved performance and type safety features.
