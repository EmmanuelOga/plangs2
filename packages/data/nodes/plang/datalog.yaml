name: Datalog
shortDesc: Declarative logic programming language and subset of Prolog, used for deductive databases.
description: Declarative logic programming language that serves as a syntactic subset of Prolog, using a bottom-up evaluation model to deduce facts. It is extensively used as a query language for deductive databases, aiding in data integration, networking, program analysis, and more.
created: "1977"
keywords:
  - datalog
  - declarative
  - deductive databases
  - logic programming
  - query language
extHomeURL: http://datalog-specs.info
extWikipediaPath: Datalog
