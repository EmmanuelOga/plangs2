name: Amber
shortDesc: Language compiling into Bash with modern syntax and safety features.
description: Programming language compiled into Bash. It was designed with a modern syntax, safety features, type safety and practical functionalities that Bash could not offer, allowing enhanced runtime and type safety for writing scripts.
created: "2015"
keywords:
  - amber
extGithubPath: amber-lang/amber
extHomeURL: https://amber-lang.com
extensions:
  - .amber
githubStars: 540
isTranspiler: true
releases:
  - version: 0.3.5.alpha
    date: 2024-09-04
rels:
  compilesTo:
    - pl/bash
  licenses:
    - lic/mit
  paradigms:
    - para/compiled
    - para/general-purpose
    - para/multi
    - para/oop
    - para/scripting
  platforms:
    - plat/apple
    - plat/linux
    - plat/web
  tags:
    - tag/cli
    - tag/scripting
  typeSystems:
    - tsys/dynamic
    - tsys/safe
    - tsys/static
  writtenWith:
    - pl/rust
