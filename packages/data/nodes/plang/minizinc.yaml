name: MiniZinc
shortDesc: Language for constraint modelling and solving complex combinatorial problems.
description: Constraint modelling language (or algebraic modeling language) to describe and solve high-complexity problems using a variety of well-known solving paradigms for combinatorial problems, including constraint programming, integer programming, lazy clause generation, SAT, and SMT.
