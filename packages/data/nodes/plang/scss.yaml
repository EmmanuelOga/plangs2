name: SCSS
shortDesc: Sassy CSS — the CSS-compatible syntax of Sass.
description: SCSS (Sassy CSS) is the newer, CSS-superset syntax of Sass, introduced with Sass 3. Every valid CSS stylesheet is valid SCSS; it adds variables, nesting, mixins and functions, and compiles to plain CSS. GitHub Linguist classifies .scss files as their own language, distinct from the indented .sass syntax.
