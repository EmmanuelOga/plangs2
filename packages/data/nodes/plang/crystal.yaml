name: Crystal
shortDesc: Compiled, statically-typed language with Ruby-like syntax and type inference.
description: Statically-typed, object-oriented programming language with syntax inspired by Ruby, aimed at providing high performance through compilation to native code. It features type inference and compiles to fast executable binaries, primarily for system and web backend applications.
