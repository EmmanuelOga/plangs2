name: Yabasic
shortDesc: BASIC interpreter with basic graphical capabilities.
description: Yet Another BASIC is a BASIC interpreter for Microsoft Windows and UNIX platforms. It is designed for simple programming tasks and offers features like basic control structures, subroutines, and the ability to create standalone executables. It supports line graphics, structured programming, and calls to libraries written in C.
