name: Red
shortDesc: Programming language supporting imperative and functional paradigms, developed to overcome Rebol's limitations.
description: Multifunctional programming language designed to address the limitations of Rebol, with features supporting both imperative and functional programming. Introduced in 2011 by Nenad Rakočević, Red caters to symbolic computations and system-level programming through its high-level and low-level syntactical elements.
