# Plangs v3 workspace. The workspace list grows per migration phase; legacy
# packages (server/frontend/definitions/…) are intentionally NOT members — they
# are frozen and recoverable from the `final-plangs-2` tag.
packages:
  - packages/schema
  - packages/graph
  - packages/data
  - packages/pipeline
  - apps/site

# Shared, single-sourced dependency versions (verified July 2026).
catalog:
  # runtime / graph
  graphology: 0.26.0
  graphology-types: 0.24.8
  yaml: 2.9.0
  zod: 4.4.3
  # pipeline (importers + AI enrichment)
  "@anthropic-ai/sdk": 0.111.0
  "@mozilla/readability": 0.6.0
  jsdom: 29.1.1
  turndown: 7.2.4
  "@types/jsdom": 28.0.3
  "@types/turndown": 5.0.6
  # ui / framework
  astro: 7.0.9
  "@astrojs/react": 6.0.1
  # Astro 7 defaults to the Sätteri markdown processor; remark plugins require
  # the unified-based processor to be installed explicitly.
  "@astrojs/markdown-remark": 7.2.1
  react: 19.2.7
  react-dom: 19.2.7
  "@types/react": 19.2.17
  "@types/react-dom": 19.2.3
  "@xstate/store": 4.2.1
  "@xstate/store-react": 2.0.0
  # styling
  tailwindcss: 4.3.2
  "@tailwindcss/vite": 4.3.2
  # testing (browser mode drives real Chromium via Playwright)
  playwright: 1.61.1
  "@vitest/browser-playwright": 4.1.10
  # Already pulled in transitively by browser-playwright; declared directly so
  # `@vitest/browser/matchers` resolves for `astro check` (which type-checks
  # apps/site/test) — without it `toMatchScreenshot` is an unknown property.
  "@vitest/browser": 4.1.10
  # tooling
  "@biomejs/biome": 2.5.3
  typescript: 5.9.3
  vitest: 4.1.10
  "@types/node": 24.10.1

# pnpm 11's minimumReleaseAge default can hold back fresh releases; all versions
# above are already older than the default window, so no override is needed yet.
