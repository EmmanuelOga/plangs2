# Cloudflare Workers static assets (PLAN §1 "Deploy" / §10 Cutover).
# Replaces the legacy Pages config (`pages_build_output_dir = "output"`):
# Cloudflare steers new deploys to Workers static assets, and the site is pure
# static output from Astro — no adapter, no server entrypoint.
#
# Deploy:  pnpm -F @plangs/site build && npx wrangler deploy
name = "plangs"
compatibility_date = "2026-07-01"

[assets]
directory = "apps/site/dist"
# Serve /foo for /foo/index.html and 404.html for unknown paths.
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"
