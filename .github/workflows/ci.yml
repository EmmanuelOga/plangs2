name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint, format & dead-code check
        run: pnpm check

      - name: Typecheck packages & build the site
        run: pnpm build

      # .astro files are not linted by Biome (experimental parser, PLAN §11),
      # so this is the only thing type-checking the templates.
      - name: Typecheck .astro templates
        run: pnpm -F @plangs/site check

      - name: Unit tests
        run: pnpm test

      # Phase 3 gate: every URL the v2 site served must still be served.
      - name: URL parity
        run: pnpm url-parity

      # Catches what a green build cannot: CSS that never applies, islands that
      # don't hydrate, layout that collapses, runtime errors.
      - name: Browser tests
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:browser
