name: Monthly data refresh

# Runs every importer against live upstream data and opens a PR with the diff
# (PLAN §5, ROADMAP 1e). It NEVER commits to main and NEVER deploys — a human
# reviews the PR, exactly like a contributor's.
#
# UNTESTED: authored 2026-07-17 but never run, because nothing has been pushed
# (ROADMAP hard rule 1). Treat the first real run as a dry run and read the PR
# carefully — the importers found three silent data bugs the first time they ran
# locally.

on:
  schedule:
    # 07:00 UTC on the 1st of each month. PYPL and languish publish monthly, so
    # anything more frequent just re-opens the same PR.
    - cron: "0 7 1 * *"
  workflow_dispatch: # allow a manual run from the Actions tab

# Only the PR step needs write access; give the rest of the job none.
permissions:
  contents: read

concurrency:
  group: data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the refresh branch
      pull-requests: write # open the PR
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # languish reads per-metric quarterly JSON from a checkout of its repo
      # (packages/pipeline/src/sources/languish.ts). The other three fetch over
      # the network and need no clone.
      - name: Clone languish data
        run: git clone --depth 1 https://github.com/tjpalmer/languish.git "$RUNNER_TEMP/languish"

      # linguist, languish, wikidata, pypl — in adoption order. Each is
      # idempotent and writes only the fields it `owns`. wikidata only touches
      # nodes that already carry a sources.wikidata QID (seeded already); it
      # never guesses.
      - name: Run importers
        env:
          LANGUISH_DIR: ${{ runner.temp }}/languish
        run: pnpm pipeline run --all

      # Canonical formatting, so the PR diff is minimal and stable.
      - name: Format the dataset
        run: pnpm data:fmt

      # Do NOT open a PR for a refresh that breaks the build. The full loop also
      # runs the migration gate (nothing from v2 lost) and schema validation
      # over the refreshed data — the pypl trend-shape bug was caught exactly
      # here.
      - name: Verify
        run: |
          pnpm check
          pnpm build
          pnpm -F @plangs/site check
          pnpm test
          pnpm url-parity
          node scripts/data-fmt.mjs --check

      - name: Open a pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: data-refresh
          base: main
          commit-message: "data: monthly importer refresh"
          title: "data: monthly importer refresh"
          labels: data-refresh
          body: |
            Automated monthly refresh of the four importers
            (linguist, languish, wikidata, pypl).

            **Review before merging** — the importers own real facts and the
            first local run surfaced three silent bugs. Things to check:
            - the `[drift vs v2]` line in the test output (must be
              *changed*/*added* only, never *lost*);
            - any `extensions` a language lost (linguist owns that field and
              splits languages we merged);
            - the per-source review reports for `inception-suggestion` and
              fuzzy-match candidates that a human should promote by pinning
              `sources.<id>`.

            Generated by `.github/workflows/data-refresh.yml`. Never deploys.
